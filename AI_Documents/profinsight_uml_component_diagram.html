<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProfInsight — UML Component Diagram</title>
<style>
  :root {
    --color-bg: #ffffff;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #555555;
    --color-border-primary: rgba(0,0,0,0.4);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-background-secondary: #f5f5f5;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #0e0e0e;
      --color-text-primary: #e8e8e8;
      --color-text-secondary: #999999;
      --color-border-primary: rgba(255,255,255,0.4);
      --color-border-secondary: rgba(255,255,255,0.3);
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-background-secondary: #1a1a1a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: var(--font-sans);
    padding: 32px 24px 64px;
  }
  header {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #378ADD, #7F77DD);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  header p  { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }
  .diagram-wrap {
    width: 100%;
    max-width: 860px;
    margin: 0 auto;
    background: var(--color-bg);
    border: 1px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 16px;
    overflow-x: auto;
  }
  /* ── SVG pre-built classes ── */
  svg { display: block; }
  svg text { font-family: var(--font-sans); fill: var(--color-text-primary); }
  svg text.t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  svg text.ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  svg text.th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  svg .box  { fill: var(--color-background-secondary); stroke: var(--color-border-secondary); }
  svg .arr  { fill: none; stroke: var(--color-border-secondary); stroke-width: 1.5; }
  svg .leader { fill: none; stroke: var(--color-border-tertiary); stroke-width: 0.5; stroke-dasharray: 3 3; }
  svg .node { cursor: pointer; }

  /* ── Color ramps (light mode) ── */
  svg .c-blue   rect, svg .c-blue   circle, svg .c-blue   ellipse { fill: #E6F1FB; stroke: #185FA5; }
  svg .c-blue   text.th { fill: #0C447C; }
  svg .c-blue   text.ts { fill: #185FA5; }
  svg .c-purple rect, svg .c-purple circle, svg .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
  svg .c-purple text.th { fill: #3C3489; }
  svg .c-purple text.ts { fill: #534AB7; }
  svg .c-teal   rect, svg .c-teal   circle, svg .c-teal   ellipse { fill: #E1F5EE; stroke: #0F6E56; }
  svg .c-teal   text.th { fill: #085041; }
  svg .c-teal   text.ts { fill: #0F6E56; }
  svg .c-amber  rect, svg .c-amber  circle, svg .c-amber  ellipse { fill: #FAEEDA; stroke: #854F0B; }
  svg .c-amber  text.th { fill: #633806; }
  svg .c-amber  text.ts { fill: #854F0B; }
  svg .c-coral  rect, svg .c-coral  circle, svg .c-coral  ellipse { fill: #FAECE7; stroke: #993C1D; }
  svg .c-coral  text.th { fill: #712B13; }
  svg .c-coral  text.ts { fill: #993C1D; }
  svg .c-gray   rect, svg .c-gray   circle, svg .c-gray   ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  svg .c-gray   text.th { fill: #444441; }
  svg .c-gray   text.ts { fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    svg .c-blue   rect, svg .c-blue   circle, svg .c-blue   ellipse { fill: #0C447C; stroke: #85B7EB; }
    svg .c-blue   text.th { fill: #B5D4F4; }
    svg .c-blue   text.ts { fill: #85B7EB; }
    svg .c-purple rect, svg .c-purple circle, svg .c-purple ellipse { fill: #3C3489; stroke: #AFA9EC; }
    svg .c-purple text.th { fill: #CECBF6; }
    svg .c-purple text.ts { fill: #AFA9EC; }
    svg .c-teal   rect, svg .c-teal   circle, svg .c-teal   ellipse { fill: #085041; stroke: #5DCAA5; }
    svg .c-teal   text.th { fill: #9FE1CB; }
    svg .c-teal   text.ts { fill: #5DCAA5; }
    svg .c-amber  rect, svg .c-amber  circle, svg .c-amber  ellipse { fill: #633806; stroke: #EF9F27; }
    svg .c-amber  text.th { fill: #FAC775; }
    svg .c-amber  text.ts { fill: #EF9F27; }
    svg .c-coral  rect, svg .c-coral  circle, svg .c-coral  ellipse { fill: #712B13; stroke: #F0997B; }
    svg .c-coral  text.th { fill: #F5C4B3; }
    svg .c-coral  text.ts { fill: #F0997B; }
    svg .c-gray   rect, svg .c-gray   circle, svg .c-gray   ellipse { fill: #444441; stroke: #B4B2A9; }
    svg .c-gray   text.th { fill: #D3D1C7; }
    svg .c-gray   text.ts { fill: #B4B2A9; }
    svg text.t    { fill: #e8e8e8; }
    svg text.ts   { fill: #999999; }
    svg text.th   { fill: #e8e8e8; }
  }

  svg .node:hover rect, svg .node:hover circle { opacity: 0.85; }
  footer { margin-top: 32px; text-align: center; font-size: 11px; color: var(--color-text-secondary); }
</style>
</head>
